name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install AVR toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-avr avr-libc binutils-avr make

      - name: Toolchain versions
        run: |
          avr-gcc --version | head -1
          avr-g++ --version | head -1
          dpkg -s avr-libc | grep '^Version'
          make --version | head -1

      - name: Compile each .cpp standalone (mmcu=atmega32u4)
        run: |
          set -e
          shopt -s nullglob
          for f in src/*.cpp; do
            echo "::group::$f"
            avr-g++ -c "$f" -o /dev/null \
              -mmcu=atmega32u4 \
              -std=gnu++17 \
              -fno-exceptions \
              -funsigned-char \
              -funsigned-bitfields \
              -fpack-struct \
              -fshort-enums \
              -Os \
              -I src \
              -DF_CPU=16000000UL \
              -Wall
            echo "::endgroup::"
          done

      - name: Compile aggregate header check
        run: |
          avr-g++ -c tests/all_headers.cpp -o /dev/null \
            -mmcu=atmega32u4 \
            -std=gnu++17 \
            -fno-exceptions \
            -funsigned-char \
            -funsigned-bitfields \
            -fpack-struct \
            -fshort-enums \
            -Os \
            -I src \
            -DF_CPU=16000000UL \
            -Wall
